# =============================================================================
# Accelerate DDP Config — Multi-GPU Single Node
# =============================================================================
# Usage:
#   accelerate launch --config_file scripts/accelerate_config.yaml scripts/train_per_species.py ...
#   accelerate test --config_file scripts/accelerate_config.yaml   # verify config
# =============================================================================

compute_environment: LOCAL_MACHINE
distributed_type: MULTI_GPU
downcast_bf16: 'no'
machine_rank: 0
main_process_ip: null
main_process_port: null
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
